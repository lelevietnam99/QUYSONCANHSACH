    <title>Quy Sơn Cảnh Sách</title>
    <!-- Tích hợp FontAwesome cho icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #00d2ff;
            --bg-gradient: radial-gradient(ellipse at bottom, #1b2735 0%, #090a0f 100%);
        }

        body {
            margin: 0;
            padding: 40px 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
            
            /* Background vũ trụ gradient */
            background: var(--bg-gradient);
            background-attachment: fixed;
            
            display: flex;
            justify-content: center;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* Tạo hiệu ứng các vì sao (stars) trôi nhẹ nhàng */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 2px;
            height: 2px;
            background: transparent;
            /* Phân bổ các điểm sáng ngẫu nhiên */
            box-shadow: 17vw 15vh #FFF, 82vw 82vh #FFF, 42vw 52vh #FFF, 32vw 22vh #FFF, 95vw 45vh #FFF, 50vw 80vh #FFF, 20vw 90vh #FFF, 80vw 10vh #FFF, 10vw 60vh #FFF, 60vw 30vh #FFF, 70vw 70vh #FFF, 85vw 35vh #FFF, 30vw 75vh #FFF, 5vw 25vh #FFF, 45vw 90vh #FFF;
            animation: animStar 100s linear infinite;
            z-index: -1;
            opacity: 0.8;
        }
        
        .stars::after {
            content: " ";
            position: absolute;
            top: 100vh;
            width: 2px;
            height: 2px;
            background: transparent;
            box-shadow: 17vw 15vh #FFF, 82vw 82vh #FFF, 42vw 52vh #FFF, 32vw 22vh #FFF, 95vw 45vh #FFF, 50vw 80vh #FFF, 20vw 90vh #FFF, 80vw 10vh #FFF, 10vw 60vh #FFF, 60vw 30vh #FFF, 70vw 70vh #FFF, 85vw 35vh #FFF, 30vw 75vh #FFF, 5vw 25vh #FFF, 45vw 90vh #FFF;
        }

        @keyframes animStar {
            from { transform: translateY(0px); }
            to { transform: translateY(-100vh); }
        }

        /* Khung chứa nội dung: Hiệu ứng kính (Glassmorphism) mờ ảo */
        .container {
            background-color: rgba(20, 20, 35, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 1000px;
            width: 100%;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
            height: fit-content;
        }

        h1 {
            text-align: center;
            color: #fff;
            font-size: 2.5em;
            margin-top: 0;
            margin-bottom: 40px;
            text-transform: uppercase;
            letter-spacing: 4px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
            padding-bottom: 15px;
            text-shadow: 0 0 15px rgba(0, 210, 255, 0.6);
        }

        .links-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
        }

        .link-item {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 16px;
            text-decoration: none;
            color: #d1d1d1;
            border-radius: 10px;
            font-weight: 600;
            font-size: 1.1em;
            transition: all 0.3s ease;
        }

        .link-item:hover {
            background: rgba(0, 210, 255, 0.15);
            color: #fff;
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0, 210, 255, 0.3);
            border-color: rgba(0, 210, 255, 0.5);
        }

        .link-item i {
            font-size: 1.2em;
            color: var(--primary-color);
            filter: drop-shadow(0 0 5px rgba(0, 210, 255, 0.5));
        }
    </style>
</head>
